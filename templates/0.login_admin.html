<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administración — Sistema de Votación</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --azul: #3a7abf;
      --azul-oscuro: #2a5a9f;
      --gris-cabecera: #4a4a4a;
      --gris-cabecera2: #5a5a5a;
      --gris-fondo: #e8e8e8;
      --rojo: #c0392b;
      --rojo-fondo: #fff5f5;
      --rojo-borde: #f5b8b0;
      --blanco: #fff;
      --texto: #333;
    }
    body {
      font-family: Arial, 'Helvetica Neue', sans-serif;
      background: var(--gris-fondo);
      height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--texto);
      font-size: 16px;
      overflow: hidden;
    }
    .hdr-top {
      background: var(--gris-cabecera);
      padding: 14px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .hdr-top-izq { display: flex; align-items: center; gap: 14px; min-height: 34px; }
    .hdr-top-txt { font-size: 16px; color: rgba(255,255,255,0.85); letter-spacing: 0.02em; }
    .hdr-top-der { display: flex; flex-direction: column; align-items: flex-end; }
    .hdr-hora { font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.85); font-variant-numeric: tabular-nums; line-height: 1.2; }
    .hdr-dia  { font-size: 13px; color: rgba(255,255,255,0.45); }
    .hdr-titulo {
      background: var(--gris-cabecera2);
      padding: 20px 40px;
      text-align: center;
      border-bottom: 4px solid var(--azul);
      flex-shrink: 0;
    }
    .hdr-titulo h1 { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 5px; }
    .hdr-titulo p  { font-size: 15px; color: rgba(255,255,255,0.65); }

    .contenido {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: var(--blanco);
      border: 1px solid #ccc;
      border-radius: 2px;
      padding: 40px 48px;
      width: 90%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-sizing: border-box;
    }
    .login-titulo {
      font-size: 16px;
      font-weight: 700;
      color: var(--azul);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      padding-bottom: 16px;
      border-bottom: 1px solid #eee;
    }
    .campo { display: flex; flex-direction: column; gap: 6px; }
    .campo label { font-size: 13px; font-weight: 700; color: #555; letter-spacing: 0.04em; text-transform: uppercase; }
    .campo input {
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 2px;
      font-size: 14px;
      outline: none;
      font-family: Arial, sans-serif;
    }
    .campo input:focus { border-color: var(--azul); }

    .btn-login {
      padding: 12px;
      background: var(--azul);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: background 0.15s;
    }
    .btn-login:hover { background: var(--azul-oscuro); }

    .error-msg {
      display: none;
      background: var(--rojo-fondo);
      border: 1px solid var(--rojo-borde);
      border-left: 4px solid var(--rojo);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--rojo);
      border-radius: 0 2px 2px 0;
    }

    .volver {
      text-align: center;
      font-size: 12px;
      color: #999;
    }
    .volver a { color: #999; text-decoration: none; }
    .volver a:hover { color: var(--azul); }

    /* ── RESPONSIVE: TABLET (768px - 1024px) ── */
    @media (max-width: 1024px) {
      .hdr-top { padding: 10px 24px; }
      .hdr-top-txt { font-size: 13px; }
      .hdr-titulo { padding: 14px 24px; }
      .hdr-titulo h1 { font-size: 20px; }
    }

    /* ── RESPONSIVE: MÓVIL (max 767px) ── */
    @media (max-width: 767px) {
      .hdr-top { flex-direction: column; gap: 8px; padding: 10px 16px; align-items: center; }
      .hdr-titulo h1 { font-size: 17px; }
      .login-box { padding: 28px 24px; }
    }
  </style>
</head>
<body>

  <div class="hdr-top">
    <div class="hdr-top-izq">
      <div class="hdr-top-txt">Universidad de Burgos &nbsp;·&nbsp; Grado en Ingeniería Informática</div>
    </div>
    <div class="hdr-top-der">
      <div class="hdr-hora" id="hora"></div>
      <div class="hdr-dia"  id="dia"></div>
    </div>
  </div>

  <div class="hdr-titulo">
    <h1>Sistema de Votación Electrónica</h1>
    <p id="fecha-hdr"></p>
  </div>

  <div class="contenido">
    <div class="login-box">
      <div class="login-titulo">🔒 Acceso administración</div>

      <div class="campo">
        <label>Usuario</label>
        <input type="text" id="usuario" placeholder="Introduzca usuario" onkeydown="if(event.key==='Enter') document.getElementById('password').focus()">
      </div>

      <div class="campo">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Introduzca contraseña" onkeydown="if(event.key==='Enter') acceder()">
      </div>

      <div class="error-msg" id="error-msg">
        Usuario o contraseña incorrectos.
      </div>

      <button class="btn-login" onclick="acceder()">▶ &nbsp;Acceder</button>

      <div class="volver">
        <a href="/">← Volver al inicio</a>
      </div>
    </div>
  </div>

  <script>
    function tick() {
      const n = new Date();
      document.getElementById('hora').textContent = n.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
      const d = n.toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
      document.getElementById('dia').textContent = d;
      document.getElementById('fecha-hdr').textContent = d;
    }
    tick(); setInterval(tick, 1000);

    async function acceder() {
      const usuario  = document.getElementById('usuario').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('error-msg');

      errorMsg.style.display = 'none';

      try {
        const resp = await fetch('/api/login_admin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario, password })
        });
        const datos = await resp.json();
        if (datos.ok) {
          window.location.href = '/admin_panel';
        } else {
          errorMsg.style.display = 'block';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch(e) {
        errorMsg.style.display = 'block';
      }
    }

    window.addEventListener('load', () => document.getElementById('usuario').focus());
  </script>

</body>
</html>
