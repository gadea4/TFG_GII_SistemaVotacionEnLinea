<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bases de Datos — Sistema de Votación</title>
</head>
<body>

  <div class="hdr-top">
    <div class="hdr-top-izq">
      <div class="hdr-top-txt">Universidad de Burgos &nbsp;·&nbsp; Grado en Ingeniería Informática</div>
    </div>
    <div class="hdr-top-der">
      <div class="hdr-hora" id="hora"></div>
      <div class="hdr-dia" id="dia"></div>
    </div>
  </div>

  <div class="hdr-titulo">
    <h1>Bases de Datos</h1>
    <p id="fecha-hdr"></p>
  </div>

  <div class="contenido">

    <div class="tabs" style="display:flex; justify-content:space-between; align-items:center;">
      <div class="tab">Administración</div>
      <a href="/admin_panel" style="font-size:11px; color:rgba(0,0,0,0.75); text-decoration:none; letter-spacing:0.04em; padding:0 16px;">← Volver al panel</a>
    </div>

    <div class="panel">
      <div class="panel-titulo">Gestión de bases de datos</div>
      <div class="panel-body">

        <div class="panel-body-fila">

          <div class="panel-body-izq">
            <button class="bbdd-btn" id="btn-bd-censo" onclick="seleccionarBD('censo')">Censo</button>
            <button class="bbdd-btn" id="btn-bd-partidos" onclick="seleccionarBD('partidos')">Partidos</button>
            <button class="bbdd-btn" id="btn-bd-candidaturas" onclick="seleccionarBD('candidaturas')">Candidaturas</button>
          </div>

          <div class="panel-body-der" id="panel-der">
            <div class="bbdd-vacio">Seleccione una base de datos a la izquierda para ver sus datos.</div>
          </div>

        </div>

      </div>
    </div>

  </div>

  <!-- MODAL DE EDICIÓN -->
  <div class="modal-fondo oculto" id="modal-fondo">
    <div class="modal-box" id="modal-box">
      <!-- contenido inyectado dinámicamente -->
    </div>
  </div>

</body>
</html>
